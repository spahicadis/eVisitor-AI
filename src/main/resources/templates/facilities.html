<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moji objekti</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div th:replace="~{fragments/layout :: header}"></div>

<main class="container-fluid px-4 py-4">

    <h1 class="h3 mb-4">Moji objekti</h1>

    <p class="text-muted" th:if="${#lists.isEmpty(facilities)}">Još nema objekata.</p>

    <div class="row g-4">
        <div class="col-12 col-md-6 col-xl-4" th:each="card : ${facilities}">
            <div class="card shadow-sm h-100">

                <img th:if="${card.facility.imageUrl != null and !card.facility.imageUrl.isBlank()}"
                     th:src="${card.facility.imageUrl}" th:alt="${card.facility.name}"
                     class="card-img-top" style="height: 200px; object-fit: cover;">
                <div th:unless="${card.facility.imageUrl != null and !card.facility.imageUrl.isBlank()}"
                     class="d-flex align-items-center justify-content-center bg-light text-muted"
                     style="height: 200px;">
                    <i class="bi bi-house-door" style="font-size: 3rem;"></i>
                </div>

                <div class="card-body pb-2">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div>
                            <h2 class="h5 mb-1" th:text="${card.facility.name}">Villa Stella</h2>
                            <p class="text-muted small mb-0" th:if="${card.facility.address != null}"
                               th:text="${card.facility.address}">Adresa</p>
                        </div>
                        <span class="badge text-bg-secondary flex-shrink-0 ms-2"
                              th:text="${card.facility.code}">0263295</span>
                    </div>

                    <div class="row text-center g-2">
                        <div class="col">
                            <div class="fw-bold" th:text="${card.facility.maxPersons}">8</div>
                            <div class="text-muted small">osoba</div>
                        </div>
                        <div class="col">
                            <div class="fw-bold" th:text="${card.facility.bedrooms}">3</div>
                            <div class="text-muted small">spavaće</div>
                        </div>
                        <div class="col">
                            <div class="fw-bold" th:text="${card.facility.bathrooms}">3</div>
                            <div class="text-muted small">kupaonice</div>
                        </div>
                        <div class="col">
                            <div class="fw-bold" th:text="${card.facility.areaSqm != null ? card.facility.areaSqm : '–'}">115</div>
                            <div class="text-muted small">m²</div>
                        </div>
                        <div class="col">
                            <div class="fw-bold text-primary"
                                 th:text="${#numbers.formatDecimal(card.averageNights, 1, 1)}">4.5</div>
                            <div class="text-muted small">prosj. noćenja</div>
                        </div>
                    </div>
                </div>

                <hr class="m-0" th:if="${!#lists.isEmpty(card.facility.amenities)}">
                <div class="card-body" th:if="${!#lists.isEmpty(card.facility.amenities)}">
                    <div class="d-flex flex-wrap gap-3">
                        <span class="d-inline-flex align-items-center gap-2"
                              th:each="a : ${card.facility.amenities}">
                            <i class="bi text-secondary" th:classappend="'bi-' + ${a.icon}"></i>
                            <span class="small" th:text="${a.label}">Amenity</span>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>

</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
